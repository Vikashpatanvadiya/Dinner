kind = "web"
previewPath = "/"
title = "Queue App"
version = "1.0.0"
id = "artifacts/queue-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20703

[services.development]
run = "pnpm --filter @workspace/queue-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/queue-app", "run", "build" ]
publicDir = "artifacts/queue-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20703"
BASE_PATH = "/"
